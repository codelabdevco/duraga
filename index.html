<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Tarot - ดูดวงไพ่ทาโร่</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4af37;
    --gold-light: #f0d68a;
    --purple-deep: #1a0a2e;
    --purple-mid: #2d1b69;
    --purple-light: #7b2ff7;
    --mystic-blue: #00d4ff;
  }

  body {
    min-height: 100vh;
    background: var(--purple-deep);
    font-family: 'Noto Sans Thai', sans-serif;
    color: #e8dff5;
    overflow-x: hidden;
  }

  /* Stars background */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-opacity); transform: scale(1); }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--gold);
    border-radius: 50%;
    animation: floatUp var(--duration) ease-in infinite;
    opacity: 0;
    filter: blur(1px);
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 20px;
    animation: fadeInDown 1s ease-out;
  }

  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), #fff5cc, var(--gold));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
    letter-spacing: 3px;
  }

  .header .subtitle {
    font-size: 1.1rem;
    color: rgba(212, 175, 55, 0.7);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  @keyframes shimmer {
    to { background-position: 200% center; }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Moon decoration */
  .moon {
    position: fixed;
    top: 40px;
    right: 60px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff5cc, var(--gold), #b8860b);
    box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 0 80px rgba(212, 175, 55, 0.2);
    z-index: 1;
    animation: moonGlow 4s ease-in-out infinite;
  }

  @keyframes moonGlow {
    0%, 100% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 0 80px rgba(212, 175, 55, 0.2); }
    50% { box-shadow: 0 0 60px rgba(212, 175, 55, 0.6), 0 0 120px rgba(212, 175, 55, 0.3); }
  }

  /* Spread type selection */
  .spread-select {
    display: flex;
    gap: 16px;
    margin: 20px 0 30px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeIn 1s ease-out 0.3s both;
  }

  .spread-btn {
    padding: 12px 28px;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 1rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 1px;
  }

  .spread-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
    transition: left 0.5s;
  }

  .spread-btn:hover::before { left: 100%; }
  .spread-btn:hover {
    background: rgba(212, 175, 55, 0.15);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    transform: translateY(-2px);
  }

  .spread-btn.active {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.1));
    box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
  }

  /* Card area */
  .card-area {
    width: 100%;
    min-height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    flex-wrap: wrap;
    padding: 20px;
    perspective: 1200px;
  }

  /* Deck (before dealing) */
  .deck-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 1s ease-out;
  }

  .deck {
    position: relative;
    width: 180px;
    height: 280px;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .deck:hover { transform: translateY(-8px); }

  .deck-card {
    position: absolute;
    width: 180px;
    height: 280px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--purple-mid), #1a0533);
    border: 2px solid var(--gold);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: transform 0.2s;
  }

  .deck-card::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(212, 175, 55, 0.4);
    border-radius: 8px;
  }

  .deck-card::after {
    content: '✦';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
  }

  .deck-instruction {
    font-size: 1.1rem;
    color: rgba(212, 175, 55, 0.8);
    text-align: center;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Tarot cards */
  .tarot-slot {
    position: relative;
    width: 180px;
    height: 280px;
    perspective: 800px;
  }

  .tarot-card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .tarot-card.flipped {
    transform: rotateY(180deg);
  }

  .tarot-card.dealing {
    animation: dealCard 0.6s ease-out both;
  }

  @keyframes dealCard {
    from {
      opacity: 0;
      transform: translateY(-200px) rotateZ(20deg) scale(0.5);
    }
    to {
      opacity: 1;
      transform: translateY(0) rotateZ(0deg) scale(1);
    }
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
  }

  /* Card back */
  .card-back {
    background: linear-gradient(135deg, var(--purple-mid), #1a0533);
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .card-back-design {
    width: 85%;
    height: 90%;
    border: 1px solid rgba(212, 175, 55, 0.5);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: repeating-conic-gradient(
      rgba(212, 175, 55, 0.05) 0% 25%,
      transparent 0% 50%
    ) 50% / 20px 20px;
  }

  .card-back-design::before {
    content: '☽';
    font-size: 3.5rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
  }

  .card-back-design::after {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 4px;
  }

  /* Card front */
  .card-front {
    transform: rotateY(180deg);
    border: 2px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(123, 47, 247, 0.3);
  }

  .card-numeral {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .card-image {
    font-size: 4.5rem;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
  }

  .card-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.85rem;
    color: var(--gold-light);
    text-align: center;
    margin: 6px 0;
    letter-spacing: 1px;
    line-height: 1.3;
  }

  .card-name-th {
    font-size: 0.8rem;
    color: rgba(212, 175, 55, 0.7);
    text-align: center;
    margin-bottom: 4px;
  }

  .card-keyword {
    font-size: 0.7rem;
    color: rgba(200, 180, 230, 0.8);
    text-align: center;
    padding: 3px 10px;
    border: 1px solid rgba(200, 180, 230, 0.2);
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Position label */
  .position-label {
    text-align: center;
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--mystic-blue);
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out forwards;
  }

  /* Glow on hover */
  .tarot-card:not(.flipped):hover {
    filter: brightness(1.2);
  }

  .tarot-card:not(.flipped):hover .card-back {
    box-shadow: 0 8px 40px rgba(212, 175, 55, 0.4), 0 0 30px rgba(123, 47, 247, 0.3);
  }

  /* Reading result */
  .reading-section {
    width: 100%;
    max-width: 800px;
    margin: 30px auto;
    animation: slideUp 0.8s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reading-card-result {
    background: linear-gradient(135deg, rgba(45, 27, 105, 0.6), rgba(26, 10, 46, 0.8));
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
    animation: resultFadeIn 0.6s ease-out both;
  }

  @keyframes resultFadeIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
  }

  .result-icon { font-size: 2rem; }

  .result-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--gold-light);
  }

  .result-position {
    font-size: 0.85rem;
    color: var(--mystic-blue);
  }

  .result-meaning {
    line-height: 1.8;
    font-size: 0.95rem;
    color: rgba(232, 223, 245, 0.9);
  }

  .result-meaning .highlight {
    color: var(--gold-light);
    font-weight: 600;
  }

  /* Overall reading */
  .overall-reading {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(123, 47, 247, 0.1));
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 28px;
    margin-top: 20px;
    text-align: center;
  }

  .overall-reading h3 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gold-light);
    font-size: 1.3rem;
    margin-bottom: 16px;
  }

  .overall-reading p {
    line-height: 1.8;
    font-size: 1rem;
    color: rgba(232, 223, 245, 0.9);
  }

  /* Action buttons */
  .action-area {
    margin: 30px 0 50px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-mystic {
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), #b8860b);
    color: var(--purple-deep);
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(212, 175, 55, 0.6);
  }

  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 2px solid var(--gold);
  }

  .btn-secondary:hover {
    background: rgba(212, 175, 55, 0.1);
    transform: translateY(-3px);
  }

  /* Card reveal sparkle */
  .sparkle-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: sparkleAnim 0.8s ease-out forwards;
  }

  @keyframes sparkleAnim {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
  }

  /* Reversed card indicator */
  .reversed-badge {
    background: rgba(255, 100, 100, 0.2);
    color: #ff9999;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(255, 100, 100, 0.3);
    margin-top: 2px;
  }

  .card-front.reversed .card-image {
    transform: rotate(180deg);
  }

  /* Loading/dealing state */
  .dealing-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 10, 46, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(5px);
  }

  .dealing-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    color: var(--gold);
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .tarot-slot { width: 140px; height: 220px; }
    .card-image { font-size: 3.5rem; height: 90px; }
    .card-name { font-size: 0.75rem; }
    .card-area { gap: 16px; }
    .moon { width: 50px; height: 50px; top: 20px; right: 20px; }
  }

  /* Hidden utility */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>
<div class="moon"></div>

<div class="container">
  <header class="header">
    <h1>Mystic Tarot</h1>
    <p class="subtitle">เปิดไพ่ เปิดชะตา</p>
  </header>

  <div class="spread-select" id="spreadSelect">
    <button class="spread-btn active" data-spread="1" onclick="selectSpread(1)">ไพ่ใบเดียว</button>
    <button class="spread-btn" data-spread="3" onclick="selectSpread(3)">3 ใบ (อดีต-ปัจจุบัน-อนาคต)</button>
    <button class="spread-btn" data-spread="5" onclick="selectSpread(5)">5 ใบ (กากบาท)</button>
  </div>

  <div id="deckArea" class="deck-container">
    <div class="deck" onclick="dealCards()">
      <div class="deck-card" style="transform: translate(4px, 4px) rotate(2deg);"></div>
      <div class="deck-card" style="transform: translate(2px, 2px) rotate(1deg);"></div>
      <div class="deck-card" style="transform: translate(0, 0);"></div>
    </div>
    <p class="deck-instruction">คลิกที่สำรับเพื่อสับไพ่และเปิดไพ่</p>
  </div>

  <div class="card-area hidden" id="cardArea"></div>

  <div class="reading-section hidden" id="readingSection"></div>

  <div class="action-area hidden" id="actionArea">
    <button class="btn-mystic btn-primary" onclick="resetReading()">เปิดไพ่ใหม่</button>
  </div>
</div>

<script>
// ====== TAROT DATA ======

  { id: 3, numeral: 'III', name: 'The Empress', nameTh: 'จักรพรรดินี', icon: '👑',
    upright: 'ความอุดมสมบูรณ์ ความรัก ธรรมชาติ ความงาม การเจริญเติบโต',

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
    star.style.setProperty('--max-opacity', (0.3 + Math.random() * 0.7));
    star.style.animationDelay = Math.random() * 4 + 's';
    container.appendChild(star);
  }
}

function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.setProperty('--duration', (8 + Math.random() * 12) + 's');
    particle.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(particle);
  }
}

function selectSpread(n) {
  selectedSpread = n;
  document.querySelectorAll('.spread-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.spread) === n);
  });
  resetReading();
}

// ====== DEAL CARDS ======
function dealCards() {
  const deck = shuffleDeck();
  drawnCards = [];
  flippedCount = 0;

  for (let i = 0; i < selectedSpread; i++) {
    const card = { ...deck[i] };
    card.isReversed = Math.random() < 0.3; // 30% chance reversed
    drawnCards.push(card);
  }

  document.getElementById('deckArea').classList.add('hidden');
  document.getElementById('readingSection').classList.add('hidden');
  document.getElementById('actionArea').classList.add('hidden');

  const cardArea = document.getElementById('cardArea');
  cardArea.classList.remove('hidden');
  cardArea.innerHTML = '';

  drawnCards.forEach((card, i) => {
    setTimeout(() => {
      const slot = createCardSlot(card, i);
      cardArea.appendChild(slot);
    }, i * 300);
  });
}

function shuffleDeck() {
  const deck = [...majorArcana];
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function createCardSlot(card, index) {
  const labels = positionLabels[selectedSpread];
  const slot = document.createElement('div');
  slot.className = 'tarot-slot';

  slot.innerHTML = `
    <div class="tarot-card dealing" style="animation-delay: ${index * 0.1}s" onclick="flipCard(this, ${index})">
      <div class="card-face card-back">
        <div class="card-back-design"></div>
      </div>
      <div class="card-face card-front ${card.isReversed ? 'reversed' : ''}" style="background: ${card.color}">
        <div class="card-numeral">${card.numeral}</div>
        <div class="card-image">${card.icon}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-name-th">${card.nameTh}</div>
        ${card.isReversed ? '<div class="reversed-badge">กลับหัว</div>' : ''}
        <div class="card-keyword">${card.isReversed ? card.reversed.split(' ').slice(0, 3).join(' ') : card.upright.split(' ').slice(0, 3).join(' ')}</div>
      </div>
    </div>
    <div class="position-label" style="animation-delay: ${0.3 + index * 0.1}s">${labels[index]}</div>
  `;

  return slot;
}

function flipCard(cardEl, index) {
  if (cardEl.classList.contains('flipped')) return;

  cardEl.classList.add('flipped');
  createSparkles(cardEl);
  flippedCount++;

  // Play reveal sound effect (visual only - sparkles)
  setTimeout(() => {
    if (flippedCount === selectedSpread) {
      showReading();
    }
  }, 900);
}

function createSparkles(cardEl) {
  const container = document.createElement('div');
  container.className = 'sparkle-container';
  cardEl.appendChild(container);

  for (let i = 0; i < 20; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    const angle = (Math.PI * 2 / 20) * i;
    const distance = 50 + Math.random() * 80;
    sparkle.style.left = '50%';
    sparkle.style.top = '50%';
    sparkle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
    sparkle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
    sparkle.style.animationDelay = Math.random() * 0.3 + 's';
    container.appendChild(sparkle);
  }

  setTimeout(() => container.remove(), 1200);
}

// ====== READING ======
function showReading() {
  const section = document.getElementById('readingSection');
  section.classList.remove('hidden');
  section.innerHTML = '';

  const labels = positionLabels[selectedSpread];

  drawnCards.forEach((card, i) => {
    const result = document.createElement('div');
    result.className = 'reading-card-result';
    result.style.animationDelay = i * 0.2 + 's';

    const detail = card.isReversed ? card.reversedDetail : card.uprightDetail;
    const keywords = card.isReversed ? card.reversed : card.upright;

    result.innerHTML = `
      <div class="result-header">
        <span class="result-icon">${card.icon}</span>
        <div>
          <div class="result-title">${card.name} ${card.isReversed ? '(กลับหัว)' : ''}</div>
          <div class="result-position">${labels[i]} — ${card.nameTh}</div>
        </div>
      </div>
      <div class="result-meaning">
        <p style="margin-bottom:8px">${detail}</p>
        <p style="font-size:0.85rem; color: rgba(200,180,230,0.7)">คีย์เวิร์ด: ${keywords}</p>
      </div>
    `;
    section.appendChild(result);
  });

  // Overall reading for 3+ cards
  if (selectedSpread >= 3) {
    const overall = document.createElement('div');
    overall.className = 'overall-reading';
    overall.style.animationDelay = drawnCards.length * 0.2 + 's';
    overall.innerHTML = `
      <h3>สรุปภาพรวม</h3>
      <p>${generateOverallReading()}</p>
    `;
    section.appendChild(overall);
  }

  document.getElementById('actionArea').classList.remove('hidden');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function generateOverallReading() {
  const hasReversed = drawnCards.some(c => c.isReversed);
  const positiveCards = [17, 19, 21, 1, 3, 10, 14]; // Star, Sun, World, Magician, Empress, Wheel, Temperance
  const challengeCards = [13, 15, 16, 18]; // Death, Devil, Tower, Moon

  const positiveCount = drawnCards.filter(c => positiveCards.includes(c.id) && !c.isReversed).length;
  const challengeCount = drawnCards.filter(c => challengeCards.includes(c.id) || c.isReversed).length;

  const messages = [];

  if (positiveCount > challengeCount) {
    messages.push('ภาพรวมของไพ่บ่งบอกว่า<span class="highlight">คุณกำลังอยู่ในช่วงเวลาที่ดี</span> พลังบวกกำลังเข้ามาในชีวิต');
  } else if (challengeCount > positiveCount) {
    messages.push('ไพ่บอกว่า<span class="highlight">คุณกำลังเผชิญช่วงเวลาแห่งความท้าทาย</span> แต่จงจำไว้ว่าทุกความท้าทายคือโอกาสในการเติบโต');
  } else {
    messages.push('ไพ่แสดงให้เห็นว่า<span class="highlight">ชีวิตของคุณกำลังอยู่ในจุดสมดุล</span> ระหว่างความท้าทายและโอกาส');
  }

  if (selectedSpread >= 3) {
    const future = drawnCards[selectedSpread === 3 ? 2 : 3];
    if (!future.isReversed && positiveCards.includes(future.id)) {
      messages.push('อนาคตดูสดใส มีสิ่งดีๆ รอคุณอยู่');
    } else if (future.isReversed) {
      messages.push('อนาคตต้องการความระมัดระวัง แต่คุณมีพลังพอที่จะรับมือ');
    }
  }

  if (hasReversed) {
    messages.push('ไพ่กลับหัวเตือนให้คุณหยุดและทบทวนบางสิ่งในชีวิต ฟังเสียงภายในของตัวเอง');
  }

  messages.push('จงเชื่อมั่นในตัวเอง แล้วทุกอย่างจะลงตัวในเวลาที่เหมาะสม ✨');

  return messages.join(' ');
}

function resetReading() {
  flippedCount = 0;
  drawnCards = [];
  document.getElementById('cardArea').classList.add('hidden');
  document.getElementById('cardArea').innerHTML = '';
  document.getElementById('readingSection').classList.add('hidden');
  document.getElementById('readingSection').innerHTML = '';
  document.getElementById('actionArea').classList.add('hidden');
  document.getElementById('deckArea').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
init();
</script>
</body>
</html>
