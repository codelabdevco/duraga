<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สัมผัส ดีวาย — ดูดวงไพ่ทาโร่</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}

:root{
  --gold:#d4a843;--gold-light:#f0d78a;--gold-dim:rgba(212,168,67,.25);
  --bg:#0a0a0f;--card-bg:#12111a;--text:#e8e0d0;
}

body{
  min-height:100dvh;background:var(--bg);
  font-family:'Noto Sans Thai',sans-serif;color:var(--text);
  overflow-x:hidden;position:relative;
}

/* ===== CANVAS STARS ===== */
#starCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ===== GOLDEN MIST ===== */
.mist{
  position:fixed;left:-20%;width:140%;height:180px;
  background:radial-gradient(ellipse at center,rgba(212,168,67,.08) 0%,transparent 70%);
  z-index:1;pointer-events:none;filter:blur(40px);
  animation:mistFloat 8s ease-in-out infinite;
}
.mist-1{top:30%}
.mist-2{top:55%;animation-delay:-4s;opacity:.6}
@keyframes mistFloat{0%,100%{transform:translateX(-5%)}50%{transform:translateX(5%)}}

/* ===== HEADER ===== */
.app-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:linear-gradient(180deg,rgba(10,10,15,.95) 0%,transparent 100%);
}
.app-logo{
  font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);
  letter-spacing:2px;font-weight:600;
}
.header-icons{display:flex;gap:12px;align-items:center}
.header-icon{
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle,var(--gold) 0%,#8b6914 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:var(--bg);font-weight:700;
}

/* ===== SCREENS ===== */
.screen{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 24px 40px;
  opacity:0;pointer-events:none;
  transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1);
  transform:translateY(20px);
  will-change:opacity,transform;
}
.screen.active{opacity:1;pointer-events:auto;transform:translateY(0)}
.screen.exit-up{opacity:0;transform:translateY(-40px);pointer-events:none}

/* ===== SCREEN 1: WELCOME ===== */
.welcome-cards{
  position:relative;width:200px;height:300px;margin-bottom:32px;
}
.welcome-card-img{
  position:absolute;width:160px;height:250px;
  border-radius:12px;border:1.5px solid var(--gold);
  background:var(--card-bg);
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 30px rgba(212,168,67,.1);
  transition:transform .8s cubic-bezier(.34,1.56,.64,1);
}
.welcome-card-img:nth-child(1){transform:rotate(-12deg) translateX(-20px);z-index:1}
.welcome-card-img:nth-child(2){transform:rotate(0deg);z-index:2}
.welcome-card-img:nth-child(3){transform:rotate(12deg) translateX(20px);z-index:1}

.welcome-card-inner{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#1a1824 0%,#0d0c14 100%);
  border-radius:11px;position:relative;overflow:hidden;
}
.welcome-card-inner::before{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(212,168,67,.3);border-radius:6px;
}

.sun-symbol{
  width:60px;height:60px;position:relative;
}
.sun-symbol::before{
  content:'';position:absolute;inset:15px;
  border-radius:50%;border:2px solid var(--gold);
}
.sun-symbol::after{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 0deg,var(--gold) 2deg,transparent 4deg,transparent 22.5deg,var(--gold) 24.5deg,transparent 26.5deg,transparent 45deg,var(--gold) 47deg,transparent 49deg,transparent 67.5deg,var(--gold) 69.5deg,transparent 71.5deg,transparent 90deg,var(--gold) 92deg,transparent 94deg,transparent 112.5deg,var(--gold) 114.5deg,transparent 116.5deg,transparent 135deg,var(--gold) 137deg,transparent 139deg,transparent 157.5deg,var(--gold) 159.5deg,transparent 161.5deg,transparent 180deg,var(--gold) 182deg,transparent 184deg,transparent 202.5deg,var(--gold) 204.5deg,transparent 206.5deg,transparent 225deg,var(--gold) 227deg,transparent 229deg,transparent 247.5deg,var(--gold) 249.5deg,transparent 251.5deg,transparent 270deg,var(--gold) 272deg,transparent 274deg,transparent 292.5deg,var(--gold) 294.5deg,transparent 296.5deg,transparent 315deg,var(--gold) 317deg,transparent 319deg,transparent 337.5deg,var(--gold) 339.5deg,transparent 341.5deg);
  opacity:.6;
}

.welcome-title{
  font-family:'Cinzel',serif;font-size:1.8rem;color:var(--gold);
  text-align:center;margin-bottom:12px;letter-spacing:2px;
  text-shadow:0 0 40px rgba(212,168,67,.3);
}
.welcome-desc{
  text-align:center;color:rgba(232,224,208,.6);font-size:.9rem;
  line-height:1.7;margin-bottom:36px;max-width:300px;
}
.btn{
  padding:14px 48px;border:none;border-radius:50px;
  font-family:'Noto Sans Thai',sans-serif;font-size:1rem;font-weight:600;
  cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;letter-spacing:1px;
}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),#8b6914);
  color:var(--bg);
  box-shadow:0 4px 24px rgba(212,168,67,.4);
}
.btn-gold:active{transform:scale(.96);box-shadow:0 2px 12px rgba(212,168,67,.3)}

/* ===== SCREEN 2: SHUFFLING ===== */
.shuffle-text{
  font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold);
  margin-bottom:24px;letter-spacing:3px;
}
.shuffle-sub{color:rgba(232,224,208,.5);font-size:.85rem;margin-bottom:40px}
.shuffle-cards{
  position:relative;width:180px;height:270px;
}
.shuffle-card{
  position:absolute;width:160px;height:250px;
  border-radius:12px;border:1.5px solid var(--gold);
  background:linear-gradient(160deg,#1a1824,#0d0c14);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  left:50%;top:50%;margin-left:-80px;margin-top:-125px;
}
.shuffle-card .sun-symbol{width:50px;height:50px}

/* ===== SCREEN 3: MEDITATE ===== */
.meditate-card{
  width:180px;height:270px;border-radius:14px;
  border:1.5px solid var(--gold);
  background:linear-gradient(160deg,#1a1824,#0d0c14);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(212,168,67,.08);
  animation:cardFloat 4s ease-in-out infinite;
  margin-bottom:32px;position:relative;
}
.meditate-card::before{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(212,168,67,.25);border-radius:8px;
}
.meditate-card .sun-symbol{width:65px;height:65px}
@keyframes cardFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.meditate-text{
  font-size:1.1rem;color:var(--gold-light);text-align:center;
  margin-bottom:8px;font-weight:600;
}
.meditate-sub{
  color:rgba(232,224,208,.5);font-size:.85rem;text-align:center;
  margin-bottom:36px;
}

/* ===== SCREEN 4: SELECT CARDS (10-card spread) ===== */
.select-title{
  font-size:1rem;color:var(--gold);margin-bottom:8px;font-weight:600;
}
.select-sub{color:rgba(232,224,208,.5);font-size:.8rem;margin-bottom:20px}
.select-counter{
  font-size:.85rem;color:var(--gold);margin-bottom:16px;
  padding:6px 20px;border:1px solid var(--gold-dim);border-radius:20px;
}
.card-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:8px;width:100%;max-width:380px;padding:0 4px;
}
.mini-card{
  aspect-ratio:2/3;border-radius:8px;
  border:1.5px solid rgba(212,168,67,.4);
  background:linear-gradient(160deg,#1a1824,#0d0c14);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
}
.mini-card::before{
  content:'';position:absolute;inset:4px;
  border:1px solid rgba(212,168,67,.15);border-radius:5px;
}
.mini-card .mini-sun{
  width:24px;height:24px;position:relative;
}
.mini-card .mini-sun::before{
  content:'';position:absolute;inset:6px;
  border-radius:50%;border:1.5px solid var(--gold);
}
.mini-card .mini-sun::after{
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,transparent 0deg,var(--gold) 3deg,transparent 6deg,transparent 45deg,var(--gold) 48deg,transparent 51deg,transparent 90deg,var(--gold) 93deg,transparent 96deg,transparent 135deg,var(--gold) 138deg,transparent 141deg,transparent 180deg,var(--gold) 183deg,transparent 186deg,transparent 225deg,var(--gold) 228deg,transparent 231deg,transparent 270deg,var(--gold) 273deg,transparent 276deg,transparent 315deg,var(--gold) 318deg,transparent 321deg);
  opacity:.5;
}
.mini-card.selected{
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(212,168,67,.3);
  transform:scale(.92);
}
.mini-card.selected::after{
  content:'';position:absolute;inset:0;
  background:rgba(212,168,67,.1);border-radius:7px;
}
.mini-card.disabled{opacity:.3;pointer-events:none}

/* ===== SCREEN 5: REVEALING ===== */
.reveal-text{
  font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);
  margin-bottom:16px;letter-spacing:2px;
}
.reveal-cards{
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  max-width:380px;
}
.reveal-card{
  width:60px;height:90px;border-radius:8px;
  border:1.5px solid var(--gold);
  background:linear-gradient(160deg,#1a1824,#0d0c14);
  display:flex;align-items:center;justify-content:center;
  perspective:600px;
}
.reveal-card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
}
.reveal-card-inner.flipped{transform:rotateY(180deg)}
.reveal-card-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border-radius:7px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.reveal-card-back{
  background:linear-gradient(160deg,#1a1824,#0d0c14);
}
.reveal-card-back .mini-sun{width:20px;height:20px}
.reveal-card-front{
  transform:rotateY(180deg);
  background:linear-gradient(160deg,#2a2435,#1a1824);
  flex-direction:column;padding:4px;
}
.reveal-card-front img{
  width:100%;height:70%;object-fit:cover;border-radius:4px;
}
.reveal-card-front .rv-icon{font-size:1.8rem}
.reveal-card-front .rv-name{
  font-size:.45rem;color:var(--gold);text-align:center;
  margin-top:2px;line-height:1.2;
}

/* ===== SCREEN 6: READING ===== */
.reading-screen{
  justify-content:flex-start;padding-top:70px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.reading-title{
  font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold);
  text-align:center;margin-bottom:20px;letter-spacing:2px;
}
.reading-cards-row{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin-bottom:24px;max-width:380px;
}
.reading-mini{
  width:52px;height:78px;border-radius:6px;
  border:1px solid var(--gold-dim);overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(160deg,#2a2435,#1a1824);
}
.reading-mini .rm-icon{font-size:1.4rem}
.reading-mini .rm-name{font-size:.35rem;color:var(--gold);margin-top:2px;text-align:center}

.reading-result{
  width:100%;max-width:380px;
  background:linear-gradient(160deg,rgba(26,24,36,.9),rgba(13,12,20,.95));
  border:1px solid var(--gold-dim);border-radius:16px;
  padding:20px;margin-bottom:16px;
  animation:resultSlide .6s cubic-bezier(.4,0,.2,1) both;
}
@keyframes resultSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.reading-result h3{
  font-size:1rem;color:var(--gold-light);margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.reading-result .position-tag{
  font-size:.7rem;color:rgba(212,168,67,.6);margin-bottom:12px;
}
.reading-result p{
  font-size:.88rem;line-height:1.8;color:rgba(232,224,208,.85);
}
.reading-result .highlight{color:var(--gold-light);font-weight:600}

.btn-outline{
  padding:12px 36px;border:1.5px solid var(--gold);border-radius:50px;
  background:transparent;color:var(--gold);font-family:'Noto Sans Thai',sans-serif;
  font-size:.95rem;font-weight:500;cursor:pointer;
  transition:all .3s ease;margin-top:12px;margin-bottom:40px;
}
.btn-outline:active{background:var(--gold-dim);transform:scale(.96)}

/* ===== GOLDEN DUST PARTICLES ===== */
.dust{
  position:fixed;width:3px;height:3px;border-radius:50%;
  background:var(--gold);pointer-events:none;z-index:2;
  opacity:0;
}

/* ===== PROGRESS DOTS ===== */
.progress-dots{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:50;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(212,168,67,.2);
  transition:all .4s ease;
}
.dot.active{background:var(--gold);width:20px;border-radius:3px}

/* ===== GLOW PULSE ON CARD ===== */
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 20px rgba(212,168,67,.1)}
  50%{box-shadow:0 0 40px rgba(212,168,67,.2)}
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="mist mist-1"></div>
<div class="mist mist-2"></div>

<header class="app-header">
  <div class="app-logo">สัมผัส ดีวาย</div>
  <div class="header-icons">
    <div class="header-icon">☽</div>
    <div class="header-icon">☀</div>
  </div>
</header>

<!-- Screen 1: Welcome -->
<div class="screen active" id="s-welcome">
  <div class="welcome-cards">
    <div class="welcome-card-img"><div class="welcome-card-inner"><div class="sun-symbol"></div></div></div>
    <div class="welcome-card-img"><div class="welcome-card-inner"><div class="sun-symbol"></div></div></div>
    <div class="welcome-card-img"><div class="welcome-card-inner"><div class="sun-symbol"></div></div></div>
  </div>
  <div class="welcome-title">เริ่มต้นดูไพ่</div>
  <div class="welcome-desc">เปิดไพ่ทาโร่เพื่อค้นหาคำตอบ<br>ที่จักรวาลมีให้คุณในวันนี้<br>หลับตาแล้วตั้งจิตอธิษฐาน</div>
  <button class="btn btn-gold" onclick="goShuffle()">เริ่มดูไพ่</button>
</div>

<!-- Screen 2: Shuffling -->
<div class="screen" id="s-shuffle">
  <div class="shuffle-text">กำลังสับการ์ด</div>
  <div class="shuffle-sub">โปรดรอสักครู่...</div>
  <div class="shuffle-cards" id="shuffleCards"></div>
</div>

<!-- Screen 3: Meditate -->
<div class="screen" id="s-meditate">
  <div class="meditate-card">
    <div class="sun-symbol"></div>
  </div>
  <div class="meditate-text">หลับตาแล้วอธิษฐาน</div>
  <div class="meditate-sub">ตั้งจิตนึกถึงคำถามที่อยากรู้<br>แล้วกดปุ่มด้านล่าง</div>
  <button class="btn btn-gold" onclick="goSelect()">พร้อมแล้ว</button>
</div>

<!-- Screen 4: Select Cards -->
<div class="screen" id="s-select">
  <div class="select-title">เลือกการ์ด 10 ใบ</div>
  <div class="select-sub">แตะไพ่ที่คุณรู้สึกดึงดูด</div>
  <div class="select-counter" id="selectCounter">0 / 10</div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<!-- Screen 5: Revealing -->
<div class="screen" id="s-reveal">
  <div class="reveal-text">กำลังดีดไพ่</div>
  <div class="reveal-cards" id="revealCards"></div>
</div>

<!-- Screen 6: Reading -->
<div class="screen reading-screen" id="s-reading">
  <div class="reading-title">คำทำนายไพ่ทาโร่</div>
  <div class="reading-cards-row" id="readingCardsRow"></div>
  <div id="readingResults"></div>
  <button class="btn-outline" onclick="resetAll()">ดูไพ่อีกครั้ง</button>
</div>

<div class="progress-dots" id="progressDots">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script>
// ===== STAR CANVAS =====
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for(let i=0;i<200;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5+.3,
    phase: Math.random()*Math.PI*2,
    speed: .003+Math.random()*.008,
    maxAlpha: .3+Math.random()*.7
  });
}

function drawStars(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    const a = s.maxAlpha * (.5+.5*Math.sin(s.phase + t*s.speed));
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(212,168,67,${a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ===== TAROT DATA =====
const tarot = [
  {name:'The Fool',th:'คนโง่',icon:'🃏',
    up:'การเริ่มต้นใหม่ การผจญภัย',
    detail:'<span class="highlight">ถึงเวลาเริ่มต้นสิ่งใหม่</span> จงก้าวออกจาก comfort zone ด้วยใจที่เปิดกว้าง จักรวาลกำลังเปิดทางให้คุณ'},
  {name:'The Magician',th:'นักมายากล',icon:'🎩',
    up:'พลัง ทักษะ การสร้างสรรค์',
    detail:'<span class="highlight">คุณมีทุกสิ่งที่ต้องการในมือแล้ว</span> จงใช้ทักษะและความสามารถอย่างเต็มที่ พลังของคุณอยู่ในจุดสูงสุด'},
  {name:'High Priestess',th:'นักบวชหญิง',icon:'🌙',
    up:'สัญชาตญาณ ปัญญา ความลึกลับ',
    detail:'<span class="highlight">เชื่อสัญชาตญาณของคุณ</span> มีสิ่งซ่อนอยู่ที่ต้องค้นพบ ฟังเสียงภายในของตัวเอง คำตอบอยู่ในใจคุณแล้ว'},
  {name:'The Empress',th:'จักรพรรดินี',icon:'👑',
    up:'ความอุดมสมบูรณ์ ความรัก',
    detail:'<span class="highlight">ความอุดมสมบูรณ์กำลังมาถึง</span> ทั้งด้านความรักและการเงิน เป็นช่วงเวลาแห่งการเจริญเติบโต'},
  {name:'The Emperor',th:'จักรพรรดิ',icon:'🦁',
    up:'อำนาจ ความมั่นคง ระเบียบวินัย',
    detail:'<span class="highlight">ถึงเวลาวางแผนอย่างเป็นระบบ</span> ใช้วินัยและความเป็นผู้นำในตัวคุณ ความมั่นคงกำลังรออยู่'},
  {name:'The Hierophant',th:'นักบวช',icon:'📿',
    up:'ประเพณี ความเชื่อ การศึกษา',

  {name:'The Lovers',th:'คู่รัก',icon:'💕',

const positionNames = [
  'ตัวคุณในปัจจุบัน','อุปสรรคที่เผชิญ','เป้าหมายสูงสุด',
  'รากฐาน/อดีต','อดีตอันใกล้','อนาคตอันใกล้',
  'ตัวตนภายใน','สิ่งแวดล้อม','ความหวัง/ความกลัว','ผลลัพธ์สุดท้าย'
];

let currentScreen = 0;
let selectedCards = [];
let drawnTarot = [];

// ===== SCREEN NAVIGATION =====
function goToScreen(n){
  const screens = document.querySelectorAll('.screen');
  const dots = document.querySelectorAll('.dot');
  const prev = screens[currentScreen];
  const next = screens[n];

  prev.classList.remove('active');
  prev.classList.add('exit-up');
  setTimeout(()=> prev.classList.remove('exit-up'), 600);

  setTimeout(()=>{
    next.classList.add('active');
  }, 150);

  dots.forEach((d,i)=> d.classList.toggle('active', i===n));
  currentScreen = n;
}

// ===== SCREEN 1 -> 2: SHUFFLE =====
function goShuffle(){
  goToScreen(1);
  startShuffle();
}

function startShuffle(){
  const container = document.getElementById('shuffleCards');
  container.innerHTML = '';
  // Create 5 cards for shuffle animation
  for(let i=0;i<5;i++){
    const card = document.createElement('div');
    card.className = 'shuffle-card';
    card.innerHTML = '<div class="sun-symbol"></div>';
    container.appendChild(card);
  }
  animateShuffle(container.children, 0);
}

function animateShuffle(cards, step){
  if(step >= 12){
    setTimeout(()=> goToScreen(2), 400);
    return;
  }
  const arr = [...cards];
  arr.forEach((c,i)=>{
    const offset = (i - 2) * 30;
    const rot = (i - 2) * 8;
    const extraX = (step % 2 === 0 ? 1 : -1) * (Math.random()*20 - 10);
    c.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1)';
    c.style.transform = `translate(${offset + extraX}px, ${Math.random()*10-5}px) rotate(${rot + (Math.random()*6-3)}deg)`;
  });
  setTimeout(()=>{
    // Stack back
    arr.forEach(c=>{
      c.style.transform = `translate(0,0) rotate(0deg)`;
    });
    setTimeout(()=> animateShuffle(cards, step+1), 350);
  }, 350);
}

// ===== SCREEN 3 -> 4: SELECT =====
function goSelect(){
  buildCardGrid();
  goToScreen(3);
}

function buildCardGrid(){
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  selectedCards = [];
  updateCounter();

  for(let i=0;i<20;i++){
    const card = document.createElement('div');
    card.className = 'mini-card';
    card.innerHTML = '<div class="mini-sun"></div>';
    card.dataset.index = i;
    card.style.opacity = '0';
    card.style.transform = 'scale(0.8) translateY(20px)';
    card.addEventListener('click', ()=> toggleCard(card, i));
    grid.appendChild(card);

    // Stagger entrance
    setTimeout(()=>{
      card.style.transition = 'all .4s cubic-bezier(.34,1.56,.64,1)';
      card.style.opacity = '1';
      card.style.transform = 'scale(1) translateY(0)';
    }, 50 + i * 40);
  }
}

function toggleCard(el, idx){
  if(el.classList.contains('selected')){
    el.classList.remove('selected');
    selectedCards = selectedCards.filter(i=> i!==idx);
  } else {
    if(selectedCards.length >= 10) return;
    el.classList.add('selected');
    selectedCards.push(idx);
    // Haptic-like bounce
    el.style.transform = 'scale(.85)';
    setTimeout(()=> el.style.transform = 'scale(.92)', 150);
  }
  updateCounter();

  if(selectedCards.length === 10){
    // Disable unselected
    document.querySelectorAll('.mini-card:not(.selected)').forEach(c=> c.classList.add('disabled'));
    setTimeout(()=> goReveal(), 800);
  }
}

function updateCounter(){
  document.getElementById('selectCounter').textContent = `${selectedCards.length} / 10`;
}

// ===== SCREEN 5: REVEAL =====
function goReveal(){
  // Draw random tarot cards
  const shuffled = [...tarot].sort(()=> Math.random()-.5);
  drawnTarot = shuffled.slice(0,10);

  const container = document.getElementById('revealCards');
  container.innerHTML = '';

  drawnTarot.forEach((card,i)=>{
    const el = document.createElement('div');
    el.className = 'reveal-card';
    el.style.opacity = '0';
    el.style.transform = 'translateY(20px)';
    el.innerHTML = `
      <div class="reveal-card-inner" id="rv-${i}">
        <div class="reveal-card-face reveal-card-back">
          <div class="mini-sun"></div>
        </div>
        <div class="reveal-card-face reveal-card-front">
          <div class="rv-icon">${card.icon}</div>
          <div class="rv-name">${card.th}</div>
        </div>
      </div>
    `;
    container.appendChild(el);

    setTimeout(()=>{
      el.style.transition = 'all .5s cubic-bezier(.34,1.56,.64,1)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, i * 80);
  });

  goToScreen(4);

  // Flip cards one by one
  setTimeout(()=>{
    drawnTarot.forEach((_,i)=>{
      setTimeout(()=>{
        document.getElementById(`rv-${i}`).classList.add('flipped');
      }, i * 300);
    });
    // After all flipped, go to reading
    setTimeout(()=> goReading(), drawnTarot.length * 300 + 1200);
  }, 1500);
}

// ===== SCREEN 6: READING =====
function goReading(){
  const row = document.getElementById('readingCardsRow');
  const results = document.getElementById('readingResults');
  row.innerHTML = '';
  results.innerHTML = '';

  drawnTarot.forEach((card,i)=>{
    const mini = document.createElement('div');
    mini.className = 'reading-mini';
    mini.innerHTML = `<div class="rm-icon">${card.icon}</div><div class="rm-name">${card.th}</div>`;
    row.appendChild(mini);
  });

  drawnTarot.forEach((card,i)=>{
    const el = document.createElement('div');
    el.className = 'reading-result';
    el.style.animationDelay = `${i * .15}s`;
    el.innerHTML = `
      <h3>${card.icon} ${card.name}</h3>
      <div class="position-tag">ตำแหน่ง ${i+1}: ${positionNames[i]}</div>
      <p>${card.detail}</p>
    `;
    results.appendChild(el);
  });

  goToScreen(5);
}

// ===== RESET =====
function resetAll(){
  selectedCards = [];
  drawnTarot = [];
  currentScreen = 5;
  goToScreen(0);
}

// ===== FLOATING DUST PARTICLES =====
function createDust(){
  const d = document.createElement('div');
  d.className = 'dust';
  d.style.left = Math.random()*100 + '%';
  d.style.top = '100%';
  const dur = 6 + Math.random()*8;
  d.style.transition = `all ${dur}s linear`;
  document.body.appendChild(d);
  requestAnimationFrame(()=>{
    d.style.opacity = String(.2 + Math.random()*.5);
    d.style.top = '-5%';
    d.style.left = (parseFloat(d.style.left) + (Math.random()*10-5)) + '%';
  });
  setTimeout(()=> d.remove(), dur*1000);
}
setInterval(createDust, 400);
</script>
